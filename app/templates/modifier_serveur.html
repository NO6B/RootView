{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto mb-8">
    
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold text-white">Modification de : {{ serveur.nom }}</h1>
        <a href="{{ url_for('main.gestion_serveurs') }}" class="text-gray-400 hover:text-white text-sm transition flex items-center gap-2">
            <i class="bi bi-arrow-left"></i> Retour à la liste
        </a>
    </div>

    <div class="bg-panel border border-gray-800 rounded-xl p-6">
        <form action="{{ url_for('main.modifier_serveur', id_serveur=serveur.id) }}" method="POST">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-500 text-xs mb-1">Nom d'usage</label>
                    <input type="text" name="nom" required value="{{ serveur.nom }}"
                        class="w-full bg-rootdark border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:border-blue-500 outline-none transition">
                </div>
                
                <div>
                    <label class="block text-gray-500 text-xs mb-1">Adresse IP</label>
                    <input type="text" name="ip" required value="{{ serveur.adresse_ip }}"
                        class="w-full bg-rootdark border border-gray-700 rounded-lg px-3 py-2 text-sm text-white font-mono focus:border-blue-500 outline-none transition">
                </div>
                
                <div>
                    <label class="block text-gray-500 text-xs mb-1">Utilisateur SSH</label>
                    <input type="text" name="user_ssh" required value="{{ serveur.utilisateur_ssh }}"
                        class="w-full bg-rootdark border border-gray-700 rounded-lg px-3 py-2 text-sm text-white font-mono focus:border-blue-500 outline-none transition">
                </div>
                
                <div>
                    <label class="block text-gray-500 text-xs mb-1">Lien de la page de connexion (ex: /login)</label>
                    <input type="text" name="endpoint" required value="{{ serveur.endpoint_web }}"
                        class="w-full bg-rootdark border border-gray-700 rounded-lg px-3 py-2 text-sm text-white font-mono focus:border-blue-500 outline-none transition">
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-gray-500 text-xs mb-1">Clé privée SSH (Laisser vide pour ne pas modifier)</label>
                <textarea name="key_ssh" rows="3"
                    class="w-full bg-rootdark border border-gray-700 rounded-lg px-3 py-2 text-white font-mono text-xs focus:border-blue-500 outline-none transition resize-none"></textarea>
            </div>

            <div class="flex gap-3">
                <button type="submit"
                    style="background-color: #3b82f6; border-radius: 10px; padding: 10px 28px; font-size: 15px; font-weight: 600; color: white;">
                    Enregistrer les modifications
                </button>
            </div>
            
        </form>
    </div>
</div>
{% endblock %}
